# ── Rate limiting ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# ── HTTP → redirect to HTTPS ───────────────────────────────────
server {
    listen 80;
    server_name inixr.com www.inixr.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inixr.com www.inixr.com;

    # Free SSL certs from Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/inixr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inixr.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    client_max_body_size 50M;

    # Static files served by Nginx (fast, no Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media / uploaded videos
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # All other requests → Gunicorn
    location / {
        limit_req zone=general burst=40 nodelay;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
