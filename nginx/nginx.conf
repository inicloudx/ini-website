# ── Rate limiting ──────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# ── HTTP server (works immediately, no SSL needed) ─────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge (for when you add SSL later)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve static files directly via Nginx (fast, no Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve media/uploaded files
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # All other requests → Gunicorn (Django)
    location / {
        limit_req zone=general burst=40 nodelay;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
