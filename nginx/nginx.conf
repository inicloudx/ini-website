# ── Rate limiting ──────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

# ── HTTP → redirect to HTTPS (or serve directly if no SSL yet) ──
server {
    listen 80;
    server_name inixr.com www.inixr.com _;

    # Let's Encrypt challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS once SSL is ready
    # Comment out the return line and uncomment the proxy_pass block
    # to run HTTP-only before you set up SSL
    return 301 https://$host$request_uri;

    # ── HTTP-only fallback (before SSL is set up) ──
    # Uncomment this block and comment the return 301 above
    # to test without SSL first:
    #
    # location /static/ {
    #     alias /app/staticfiles/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    # location /media/ {
    #     alias /app/media/;
    #     expires 7d;
    # }
    # location / {
    #     proxy_pass         http://web:8000;
    #     proxy_set_header   Host $host;
    #     proxy_set_header   X-Real-IP $remote_addr;
    #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 120s;
    # }
}

# ── HTTPS ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name inixr.com www.inixr.com;

    # SSL certs from Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/inixr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inixr.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    client_max_body_size 50M;

    # Static files served by Nginx directly (very fast, no Django)
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Media files (user-uploaded videos etc.)
    location /media/ {
        alias   /app/media/;
        expires 7d;
    }

    # All other requests go to Gunicorn
    location / {
        limit_req zone=general burst=40 nodelay;
        proxy_pass         http://web:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
